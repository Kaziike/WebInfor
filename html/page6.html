<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sản Phẩm</title>
</head>

<body>
    <div class="container">
        <input type="button" value="Thêm" onclick="add()">
    </div>
</body>
<script>
    function add() {
        const myRow = document.createElement("div");
        myRow.setAttribute("class", "row");
        const myText = document.createTextNode("Hehe");
        myRow.appendChild(myText);
        document.querySelector(".container").appendChild(myRow);    
    }
</script>
</html>
